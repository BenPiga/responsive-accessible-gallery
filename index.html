<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-width=1.0">
  <title>Responsive Accessible Gallery</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body id="top">

  <h1>My Custom Photo Gallery</h1>
  
  <p>Welcome to my final responsive web design project. This gallery adapts not only to different screen sizes (mobile, tablet, and desktop) but also respects user preferences for dark mode and reduced motion!</p>

  <div class="grid">
    <figure>
      <img src="https://i.postimg.cc/bvLm88Vz/A-dish-called-Batil-Patong.jpg" alt="A dish called Batil Patong">
      <figcaption>Batil Patong</figcaption>
    </figure>
    <figure>
      <img src="https://i.postimg.cc/5tps11K4/A-dog-yawning.jpg" alt="A dog yawning">
      <figcaption>Sleepy Dog</figcaption>
    </figure>
    <figure>
      <img src="https://i.postimg.cc/hGM2ggZj/A-road-bicycle-after-a-fun-ride.jpg" alt="A road bicycle after a fun ride">
      <figcaption>Road Bicycle</figcaption>
    </figure>
    <figure>
      <img src="https://i.postimg.cc/0NZVxxX5/An-electric-guitar-and-a-tambourine.jpg" alt="An electric guitar and a tambourine">
      <figcaption>Music Gear</figcaption>
    </figure>
    <figure>
      <img src="https://i.postimg.cc/xdg6YYp8/Our-little-black-dog.jpg" alt="Our little black dog">
      <figcaption>Black Dog</figcaption>
    </figure>
    <figure>
      <img src="https://i.postimg.cc/bvLm88Vq/Our-white-shih-tzu-dog.jpg" alt="Our white shih tzu dog">
      <figcaption>White Shih Tzu</figcaption>
    </figure>
    <figure>
      <img src="https://picsum.photos/id/1015/400/400" alt="A serene river valley">
      <figcaption>River Valley</figcaption>
    </figure>
    <figure>
      <img src="https://picsum.photos/id/1016/400/400" alt="Mountains exploring the horizon">
      <figcaption>Mountains</figcaption>
    </figure>
    <figure>
      <img src="https://picsum.photos/id/1018/400/400" alt="A solitary tree in nature">
      <figcaption>Solitary Tree</figcaption>
    </figure>
  </div>

  <a href="#top" id="jump">Jump to the Top</a>

</body>
</html>
